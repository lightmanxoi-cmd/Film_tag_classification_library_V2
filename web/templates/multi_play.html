<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>Multi Play</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/multi_play.css">
</head>
<body>
    <div class="app" id="app">
        <div class="loading-screen" id="loadingScreen">
            <div class="loading-spinner"></div>
            <p>Loading videos...</p>
        </div>

        <div class="multi-player-container" id="multiPlayerContainer" style="display: none;">
            <div class="top-bar" id="topBar">
                <div class="video-count" id="videoCount">0 videos</div>
                <button class="back-btn" onclick="goBack()">Back</button>
            </div>
            
            <div class="video-grid">
                <div class="video-cell" id="cell0">
                    <video id="video0" class="video-player" autoplay muted></video>
                    <div class="video-overlay">
                        <span class="video-title" id="title0"></span>
                    </div>
                    <div class="control-bar">
                        <button class="ctrl-btn play-btn" data-player="0">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        </button>
                        <button class="ctrl-btn skip-btn" data-player="0">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                        </button>
                        <input type="range" class="progress-bar" data-player="0" min="0" max="100" value="0">
                        <span class="time-display" data-player="0">0:00 / 0:00</span>
                        <button class="ctrl-btn volume-btn" data-player="0">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                        </button>
                        <input type="range" class="volume-slider" data-player="0" min="0" max="1" step="0.1" value="0">
                    </div>
                </div>
                <div class="video-cell" id="cell1">
                    <video id="video1" class="video-player" autoplay muted></video>

                        <span class="video-title" id="title1"></span>

                        </button>

                    </div>
                </div>

                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/multi_play.js"></script>
</body>
</html>

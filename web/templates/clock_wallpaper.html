<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Clock Wallpaper</title>
    <link rel="stylesheet" href="/static/css/base/_variables.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/clock_wallpaper.css">
</head>
<body>
    <div class="app" id="app">
        <div class="loading-screen" id="loadingScreen">
            <div class="loading-spinner"></div>
            <p>Loading videos...</p>
        </div>

        <div class="player-container" id="playerContainer" style="display: none;">
            <div class="clock-overlay" id="clockOverlay">
                <span class="clock-time" id="clockTime">12:00:00</span>
            </div>

            <div class="top-bar" id="topBar">
                <div class="folder-info">
                    <span class="video-count" id="videoCount">0 videos</span>
                </div>
                <button class="browse-mode-btn" id="browseModeBtn">
                    Browse Mode
                    <span class="segment-indicator" id="segmentIndicator" style="display: none;">1/10</span>
                </button>
                <button class="back-btn" onclick="goBack()">
                    Back
                </button>
            </div>

            <video
                id="videoPlayer"
                class="video-player video-fit-cover"
                autoplay
                muted
            ></video>

            <div class="controls-overlay" id="controlsOverlay">
                <div class="video-info">
                    <span class="video-name" id="videoName"></span>
                </div>

                <div class="progress-bar-container">
                    <input
                        type="range"
                        min="0"
                        max="100"
                        value="0"
                        class="progress-bar"
                        id="progressBar"
                    >
                    <div class="time-display">
                        <span id="currentTime">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>

                <div class="control-buttons">
                    <button class="control-btn play-btn" id="playBtn">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z" />
                        </svg>
                    </button>

                    <button class="control-btn skip-btn" id="skipBtn">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
                        </svg>
                        <span>Random</span>
                    </button>

                    <div class="volume-control">
                        <button class="control-btn volume-btn" id="volumeBtn">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" />
                            </svg>
                        </button>
                        <input
                            type="range"
                            min="0"
                            max="1"
                            step="0.1"
                            value="0"
                            class="volume-slider"
                            id="volumeSlider"
                        >
                    </div>

                    <button class="control-btn fullscreen-btn" id="fullscreenBtn">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
                        </svg>
                    </button>

                    <button class="control-btn clock-toggle-btn active" id="clockToggleBtn">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z" />
                        </svg>
                        <span>Clock</span>
                    </button>

                    <button class="control-btn fit-mode-btn" id="fitModeBtn">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M3 5v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2H5c-1.11 0-2 .9-2 2zm12 4c0 1.66-1.34 3-3 3s-3-1.34-3-3 1.34-3 3-3 3 1.34 3 3zm-9 8c0-2 4-3.1 6-3.1s6 1.1 6 3.1v1H6v-1z" />
                        </svg>
                        <span>Cover</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script type="module" src="/static/js/modules/compat.js"></script>
    <script src="/static/js/clock_wallpaper.js"></script>
</body>
</html>

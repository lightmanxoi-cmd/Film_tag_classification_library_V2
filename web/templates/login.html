<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#141414">
    <title>登录 - Video Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #141414;
            color: #fff;
            min-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
        }

        .login-box {
            background: rgba(0, 0, 0, 0.75);
            border-radius: 8px;
            padding: 48px 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 700;
            color: #e50914;
            letter-spacing: 3px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #999;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #e50914;
            background: #222;
        }

        .form-group input::placeholder {
            color: #666;
        }

        .error-message {
            background: rgba(229, 9, 20, 0.1);
            border: 1px solid rgba(229, 9, 20, 0.3);
            border-radius: 4px;
            padding: 12px 16px;
            margin-bottom: 24px;
            color: #e50914;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .login-btn {
            width: 100%;
            padding: 14px 24px;
            background: #e50914;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-btn:hover {
            background: #f40612;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .security-info {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #333;
            text-align: center;
        }

        .security-info p {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }

        .security-info .encryption {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            font-size: 11px;
            color: #888;
        }

        .security-info .encryption svg {
            width: 14px;
            height: 14px;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            color: #666;
            font-size: 12px;
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 32px 24px;
            }

            .logo h1 {
                font-size: 24px;
            }

            .form-group input {
                padding: 12px 14px;
                font-size: 15px;
            }

            .login-btn {
                padding: 12px 20px;
            }
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        .login-btn.loading .loading-spinner {
            display: inline-block;
        }

        .login-btn.loading .btn-text {
            opacity: 0.7;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <h1>VIDEO LIBRARY</h1>
                <p>请输入密码以访问视频库</p>
            </div>

            <div class="error-message" id="errorMessage" data-error="{{ 'true' if error else 'false' }}"></div>

            <form id="loginForm" method="POST" action="/login">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                
                <div class="form-group">
                    <label for="password">访问密码</label>
                    <input type="password" id="password" name="password" 
                           placeholder="请输入访问密码" 
                           autocomplete="current-password"
                           required>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="loading-spinner"></span>
                    <span class="btn-text">登 录</span>
                </button>
            </form>

            <div class="security-info">
                <p>安全连接已建立</p>
                <span class="encryption">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    Argon2id + HTTPS 加密保护
                </span>
            </div>
        </div>

        <div class="footer">
            <p>© 2026 Video Library. 安全登录系统</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const passwordInput = document.getElementById('password');

        passwordInput.focus();

        if (errorMessage.dataset.error === 'true') {
            showError('密码错误，请重试');
        }

        form.addEventListener('submit', function(e) {
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            errorMessage.classList.remove('show');
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            passwordInput.focus();
            passwordInput.select();
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                passwordInput.value = '';
                passwordInput.focus();
            }
        });
    </script>
</body>
</html>

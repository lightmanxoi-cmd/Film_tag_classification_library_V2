<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#141414">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Video Library - 奈飞风格视频库</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleMobileSidebar()">
            <span class="hamburger-icon">
                <span></span>
                <span></span>
                <span></span>
            </span>
        </button>
        <div class="nav-brand">
            <span class="logo">VIDEO LIBRARY</span>
        </div>
        <div class="nav-actions">
            <button class="advanced-filter-btn" onclick="openAdvancedFilter()">多级筛选</button>
            <button class="clock-wallpaper-btn" id="clockWallpaperBtn" onclick="openClockWallpaper()" disabled>时钟壁纸</button>
        </div>
        <div class="nav-search">
            <input type="text" id="searchInput" placeholder="搜索视频...">
            <button onclick="searchVideos()">搜索</button>
        </div>
        <div class="nav-stats" id="stats">
            <span id="videoCount">0</span> 部视频
        </div>
        <button class="mobile-search-btn" id="mobileSearchBtn" onclick="toggleMobileSearch()">
            <span>🔍</span>
        </button>
    </nav>

    <div class="mobile-search-bar" id="mobileSearchBar">
        <input type="text" id="mobileSearchInput" placeholder="搜索视频...">
        <button onclick="mobileSearchVideos()">搜索</button>
        <button class="close-search-btn" onclick="closeMobileSearch()">✕</button>
    </div>

    <div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileSidebar()"></div>

    <div class="main-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3 class="sidebar-title">分类导航</h3>
                <button class="close-sidebar-btn" onclick="closeMobileSidebar()">✕</button>
            </div>
            <div id="tagTree" class="tag-tree">
                <div class="loading">加载中...</div>
            </div>
        </aside>

        <main class="content">
            <div class="current-filter" id="currentFilter" style="display: none;">
                <span class="filter-label">当前筛选:</span>
                <div class="filter-tags-wrapper">
                    <span id="filterTags"></span>
                </div>
                <button class="clear-filter" onclick="clearFilter()">清除</button>
            </div>

            <div class="video-grid" id="videoGrid">
                <div class="loading">加载中...</div>
            </div>

            <div class="pagination" id="pagination">
            </div>
        </main>
    </div>

    <div class="video-player-modal" id="videoModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeVideoModal()">&times;</button>
            <div class="video-info">
                <h2 id="modalTitle"></h2>
                <div class="video-tags" id="modalTags"></div>
            </div>
            <video id="videoPlayer" class="video-js vjs-big-play-centered vjs-fluid" controls preload="auto">
                <p class="vjs-no-js">
                    您的浏览器不支持视频播放，请升级浏览器
                </p>
            </video>
            <div class="player-actions">
                <div class="format-notice" id="formatNotice" style="display: none;">
                    <p>⚠️ MKV/WMV格式视频浏览器可能无法播放</p>
                </div>
                <div class="action-buttons">
                    <button class="action-btn local-play-btn" id="localPlayBtn" onclick="openLocalFile()">
                        <span>📁</span> 本地播放
                    </button>
                    <button class="action-btn" onclick="copyFilePath()">
                        <span>📋</span> 复制路径
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="advanced-filter-modal" id="advancedFilterModal">
        <div class="filter-modal-content">
            <div class="filter-modal-header">
                <h2>多级筛选</h2>
                <button class="close-btn" onclick="closeAdvancedFilter()">&times;</button>
            </div>
            <div class="filter-modal-body">
                <div class="filter-hint">同一分类下多选为"或"关系，不同分类间为"和"关系</div>
                <div class="filter-tags-container" id="filterTagsContainer">
                    <div class="loading">加载标签中...</div>
                </div>
                <div class="selected-tags">
                    <span class="selected-label">已选择:</span>
                    <div id="selectedTagsList" class="selected-tags-list">
                        <span class="no-selection">未选择任何标签</span>
                    </div>
                </div>
            </div>
            <div class="filter-modal-footer">
                <button class="btn-secondary" onclick="clearFilterSelection()">清除选择</button>
                <button class="btn-primary" onclick="applyAdvancedFilter()">应用筛选</button>
            </div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>

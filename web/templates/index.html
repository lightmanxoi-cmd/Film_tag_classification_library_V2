<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#141414">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <title>Video Library - 奈飞风格视频库</title>
    <link rel="stylesheet" href="/static/css/base/_variables.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/mobile.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
    <style>
        :root {
            --vh: 1vh;
            --safe-area-top: env(safe-area-inset-top, 0px);
            --safe-area-bottom: env(safe-area-inset-bottom, 0px);
            --safe-area-left: env(safe-area-inset-left, 0px);
            --safe-area-right: env(safe-area-inset-right, 0px);
        }
        .touch-active {
            opacity: 0.7;
            transform: scale(0.98);
            transition: all 0.1s ease;
        }
        .fast-scroll .video-card .video-overlay {
            opacity: 0;
        }
        
        .electron-titlebar {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 32px;
            background: #0a0a0a;
            z-index: 10000;
            -webkit-app-region: drag;
        }
        
        .electron-titlebar .title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 12px;
            line-height: 32px;
            font-family: 'Noto Sans SC', sans-serif;
        }
        
        .electron-titlebar .window-controls {
            position: absolute;
            right: 0;
            top: 0;
            height: 32px;
            display: flex;
            -webkit-app-region: no-drag;
        }
        
        .electron-titlebar .window-btn {
            width: 46px;
            height: 32px;
            border: none;
            background: transparent;
            color: #888;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        
        .electron-titlebar .window-btn:hover {
            background: #333;
            color: #fff;
        }
        
        .electron-titlebar .window-btn.close:hover {
            background: #e50914;
            color: #fff;
        }
        
        .electron-titlebar .window-btn svg {
            width: 12px;
            height: 12px;
        }
        
        body.electron-mode .electron-titlebar {
            display: block;
        }
        
        body.electron-mode .navbar {
            top: 32px;
        }
        
        body.electron-mode .main-container {
            padding-top: 100px;
        }
        
        body.electron-mode .mobile-bottom-bar {
            bottom: 0;
        }
    </style>
</head>
<body>
    <div class="electron-titlebar" id="electronTitlebar">
        <span class="title">Video Library</span>
        <div class="window-controls">
            <button class="window-btn minimize" onclick="window.electronAPI?.minimize()" title="最小化">
                <svg viewBox="0 0 12 12"><path fill="currentColor" d="M2 6h8v1H2z"/></svg>
            </button>
            <button class="window-btn maximize" onclick="window.electronAPI?.maximize()" title="最大化">
                <svg viewBox="0 0 12 12"><path fill="currentColor" d="M2 2v8h8V2H2zm1 1h6v6H3V3z"/></svg>
            </button>
            <button class="window-btn close" onclick="window.electronAPI?.close()" title="关闭">
                <svg viewBox="0 0 12 12"><path fill="currentColor" d="M2 2l8 8M10 2l-8 8" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
            </button>
        </div>
    </div>
    <nav class="navbar">
        <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleMobileSidebar()">
            <span class="hamburger-icon">
                <span></span>
                <span></span>
                <span></span>
            </span>
        </button>
        <div class="nav-brand">
            <span class="logo">VIDEO LIBRARY</span>
        </div>
        <div class="nav-actions">
            <button class="advanced-filter-btn" onclick="openAdvancedFilter()">多级筛选</button>
            <button class="fullscreen-btn" id="fullscreenBtn" onclick="toggleFullscreen()" title="全屏模式">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
                </svg>
            </button>
            <button class="shuffle-btn" id="shuffleBtn" onclick="shuffleVideos()" disabled title="随机排列">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
                </svg>
            </button>
            <button class="clock-wallpaper-btn" id="clockWallpaperBtn" onclick="openClockWallpaper()" disabled>时钟壁纸</button>
            <button class="multi-play-btn" id="multiPlayBtn" onclick="openMultiPlay()" disabled>多路同播</button>
            <button class="random-recommend-btn" id="randomRecommendBtn" onclick="openRandomRecommend()" disabled>随机推荐</button>
            <button class="video-import-btn" id="videoImportBtn" onclick="openVideoImport()" title="视频导入">
                <svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px;margin-right:4px;">
                    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                </svg>
                导入
            </button>
        </div>
        <div class="nav-search">
            <input type="text" id="searchInput" placeholder="搜索视频...">
            <button onclick="searchVideos()">搜索</button>
        </div>
        <div class="nav-stats" id="stats">
            <span id="videoCount">0</span> 部视频
        </div>
        <div class="nav-user">
            <span id="sessionTimer" class="session-timer" title="会话剩余时间"></span>
            <button class="logout-btn" onclick="logout()" title="退出登录">
                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                    <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
                </svg>
            </button>
        </div>
        <button class="mobile-search-btn" id="mobileSearchBtn" onclick="toggleMobileSearch()">
            <span>🔍</span>
        </button>
    </nav>

    <div class="mobile-search-bar" id="mobileSearchBar">
        <input type="text" id="mobileSearchInput" placeholder="搜索视频...">
        <button onclick="mobileSearchVideos()">搜索</button>
        <button class="close-search-btn" onclick="closeMobileSearch()">✕</button>
    </div>

    <div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileSidebar()"></div>

    <div class="main-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3 class="sidebar-title">分类导航</h3>
                <button class="close-sidebar-btn" onclick="closeMobileSidebar()">✕</button>
            </div>
            <div id="tagTree" class="tag-tree">
                <div class="loading">加载中...</div>
            </div>
        </aside>

        <main class="content">
            <div class="current-filter" id="currentFilter" style="display: none;">
                <span class="filter-label">当前筛选:</span>
                <div class="filter-tags-wrapper">
                    <span id="filterTags"></span>
                </div>
                <button class="clear-filter" onclick="clearFilter()">清除</button>
            </div>

            <div class="video-grid" id="videoGrid">
                <div class="loading">加载中...</div>
            </div>

            <div class="pagination" id="pagination">
            </div>
        </main>
    </div>

    <div class="video-player-modal" id="videoModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeVideoModal()">&times;</button>
            <div class="video-info">
                <h2 id="modalTitle"></h2>
                <div class="video-tags" id="modalTags"></div>
            </div>
            <video id="videoPlayer" class="video-js vjs-big-play-centered vjs-fluid" controls preload="auto">
                <p class="vjs-no-js">
                    您的浏览器不支持视频播放，请升级浏览器
                </p>
            </video>
            <div class="player-actions">
                <div class="format-notice" id="formatNotice" style="display: none;">
                    <p>⚠️ MKV/WMV格式视频浏览器可能无法播放</p>
                </div>
            </div>
        </div>
    </div>

    <div class="advanced-filter-modal" id="advancedFilterModal">
        <div class="filter-modal-content">
            <div class="filter-modal-header">
                <h2>多级筛选</h2>
                <button class="close-btn" onclick="closeAdvancedFilter()">&times;</button>
            </div>
            <div class="filter-modal-body">
                <div class="filter-hint">同一分类下多选为"或"关系，不同分类间为"和"关系</div>
                <div class="filter-tags-container" id="filterTagsContainer">
                    <div class="loading">加载标签中...</div>
                </div>
                <div class="selected-tags">
                    <span class="selected-label">已选择:</span>
                    <div id="selectedTagsList" class="selected-tags-list">
                        <span class="no-selection">未选择任何标签</span>
                    </div>
                </div>
            </div>
            <div class="filter-modal-footer">
                <button class="btn-secondary" onclick="clearFilterSelection()">清除选择</button>
                <button class="btn-primary" onclick="applyAdvancedFilter()">应用筛选</button>
            </div>
        </div>
    </div>

    <div class="mobile-bottom-bar" id="mobileBottomBar">
        <button class="mobile-bottom-bar-item" onclick="toggleMobileSidebar()">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
            </svg>
            <span>分类</span>
        </button>
        <button class="mobile-bottom-bar-item" onclick="openAdvancedFilter()">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/>
            </svg>
            <span>筛选</span>
        </button>
        <button class="mobile-bottom-bar-item" id="mobileClockBtn" onclick="openClockWallpaper()" disabled>
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
            </svg>
            <span>时钟</span>
        </button>
        <button class="mobile-bottom-bar-item" id="mobileRandomBtn" onclick="openRandomRecommend()" disabled>
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
            </svg>
            <span>随机</span>
        </button>
        <button class="mobile-bottom-bar-item" onclick="toggleMobileSearch()">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
            </svg>
            <span>搜索</span>
        </button>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script type="module" src="/static/js/modules/compat.js"></script>
    <script type="module">
        import { initMobileOptimizations, showToast } from '/static/js/modules/mobile.js';
        
        window.showToast = showToast;
        
        document.addEventListener('DOMContentLoaded', function() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) 
                || window.innerWidth < 1024;
            
            if (isMobile) {
                initMobileOptimizations({
                    enablePullToRefresh: true,
                    enableFastScroll: true,
                    enableHapticFeedback: true,
                    enableSwipeNavigation: true,
                    onRefresh: () => {
                        if (typeof loadVideos === 'function') {
                            loadVideos(1);
                        }
                        return Promise.resolve();
                    },
                    onScrollDirectionChange: (direction) => {
                        const bottomBar = document.getElementById('mobileBottomBar');
                        if (bottomBar) {
                            if (direction === 'down') {
                                bottomBar.style.transform = 'translateY(100%)';
                            } else {
                                bottomBar.style.transform = 'translateY(0)';
                            }
                        }
                    }
                });
                
                const bottomBar = document.getElementById('mobileBottomBar');
                if (bottomBar) {
                    setTimeout(() => {
                        bottomBar.classList.add('visible');
                    }, 500);
                }
                
                const originalApplyAdvancedFilter = window.applyAdvancedFilter;
                if (typeof originalApplyAdvancedFilter === 'function') {
                    window.applyAdvancedFilter = async function() {
                        await originalApplyAdvancedFilter();
                        
                        const mobileClockBtn = document.getElementById('mobileClockBtn');
                        const mobileRandomBtn = document.getElementById('mobileRandomBtn');
                        
                        if (mobileClockBtn) mobileClockBtn.disabled = false;
                        if (mobileRandomBtn) mobileRandomBtn.disabled = false;
                    };
                }
                
                console.log('[Mobile] 移动端优化已启用');
            }
        });
    </script>
    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
